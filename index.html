<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var customFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              }
            });
          }
        } catch (e) {
          console.warn("Unable to redefine fetch descriptor:", e);
        }
      })();
    </script>
    <title>Hello Judy - Gay Travel Companion</title>
    <!-- Editorial Aesthetic Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
